{% set name = "PyNomaly" %}
{% set version = "0.3.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/PyNomaly-{{ version }}.tar.gz
  sha256: 8bf89d904eccccde581fc27d90295bb4a7e9de6cc3a2dd726fdd79df8678e0bd

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - pip
  run:
    - python
    - numpy
    - python-utils

test:
  imports:
    - PyNomaly
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/vc1492a/PyNomaly
  summary: 'A Python 3 implementation of LoOP: Local Outlier Probabilities, a local density based outlier detection method providing an outlier score in the range of [0,1].'
  license: NOASSERTION
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - vc1492a
    - IroNEDR
